<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuralPrep — Your Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--bg:#05060f;--bg2:#0b0d1e;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--accent:#6c63ff;--accent2:#00d9c0;--accent3:#ff6b6b;--success:#00e676;--warning:#ffa000;--danger:#ff1744;--text:#e8e9f3;--muted:#6b6d8a;--glow:rgba(108,99,255,0.35);}
    [data-theme="light"]{--bg:#f0f1fa;--bg2:#e4e6f7;--surface:rgba(0,0,0,0.04);--border:rgba(0,0,0,0.08);--text:#0d0e1f;--muted:#7b7d9a;--glow:rgba(108,99,255,0.2);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3rem;background:rgba(5,6,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
    [data-theme="light"] nav{background:rgba(240,241,250,0.9);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right a{color:var(--muted);text-decoration:none;font-size:0.88rem;transition:color 0.2s;}
    .nav-right a:hover{color:var(--text);}
    .theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.9rem;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .theme-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
    .page-wrap{max-width:1000px;margin:0 auto;padding:3rem 2rem 5rem;}
    .page-header{margin-bottom:2.5rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
    .page-header h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;letter-spacing:-0.5px;}
    .page-header p{color:var(--muted);font-size:0.9rem;margin-top:0.3rem;}
    .header-actions{display:flex;gap:0.75rem;flex-wrap:wrap;}
    .btn-pdf{display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,var(--accent2),#00bfa5);color:#000;padding:0.75rem 1.6rem;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;transition:all 0.2s;}
    .btn-pdf:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(0,217,192,0.35);}
    .btn-dashboard{display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,var(--accent),#9b59b6);color:#fff;padding:0.75rem 1.6rem;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;transition:all 0.2s;text-decoration:none;}
    .btn-dashboard:hover{transform:translateY(-2px);box-shadow:0 6px 25px var(--glow);}
    .alert-banner{border-radius:16px;padding:1.2rem 1.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:1rem;font-weight:600;}
    .alert-banner.danger{background:rgba(255,23,68,0.08);border:1px solid rgba(255,23,68,0.25);color:var(--danger);animation:shake 0.5s;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .alert-banner.success{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.25);color:var(--success);}
    .alert-subjects{font-size:0.85rem;opacity:0.8;font-weight:400;margin-top:0.2rem;}

    /* Motivational quote on results */
    .result-quote{background:linear-gradient(135deg,rgba(108,99,255,0.08),rgba(0,217,192,0.08));border:1px solid rgba(108,99,255,0.15);border-radius:14px;padding:1rem 1.5rem;margin-bottom:2rem;font-size:0.88rem;color:var(--muted);font-style:italic;text-align:center;}
    .result-quote strong{color:var(--accent2);font-style:normal;}

    .scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
    .score-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.3rem;text-align:center;transition:all 0.3s;position:relative;overflow:hidden;}
    .score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .score-card.critical::before{background:var(--danger);}
    .score-card.average::before{background:var(--warning);}
    .score-card.excellent::before{background:var(--success);}
    .score-card:hover{transform:translateY(-5px);border-color:rgba(108,99,255,0.3);}
    .score-card.critical{animation:vibrate 0.4s infinite;}
    @keyframes vibrate{0%,100%{transform:translate(0)}25%{transform:translate(1px,1px)}75%{transform:translate(-1px,-1px)}}
    .score-card.critical:hover{animation:none;transform:translateY(-5px);}
    .score-dot{width:10px;height:10px;border-radius:50%;margin:0 auto 0.6rem;}
    .score-subject{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;margin-bottom:0.4rem;}
    .score-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1;}
    .score-max{font-size:0.78rem;color:var(--muted);margin-top:0.2rem;}
    .score-badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem;font-weight:600;margin-top:0.5rem;}
    .critical .score-badge{background:rgba(255,23,68,0.15);color:var(--danger);}
    .average .score-badge{background:rgba(255,160,0,0.15);color:var(--warning);}
    .excellent .score-badge{background:rgba(0,230,118,0.15);color:var(--success);}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;margin-bottom:2rem;}
    .chart-title{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1.5rem;font-size:1rem;}
    .chart-wrap{position:relative;height:280px;}
    .roadmap-section{margin-bottom:2rem;}
    .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.5rem;}
    .time-config{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;}
    .time-config select{padding:0.6rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;outline:none;appearance:none;}
    .time-config select:focus{border-color:var(--accent);}
    .time-config select option{background:var(--bg2);}
    .roadmap-list{display:flex;flex-direction:column;gap:1rem;}
    .roadmap-item{border-left:4px solid;border-radius:0 16px 16px 0;padding:1.3rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:all 0.3s;opacity:0;transform:translateX(-20px);animation:slideIn 0.4s forwards;}
    .roadmap-item:hover{transform:translateX(4px) !important;box-shadow:0 8px 30px rgba(0,0,0,0.2);}
    @keyframes slideIn{to{opacity:1;transform:translateX(0)}}
    .roadmap-item.critical{border-left-color:var(--danger);animation:slideIn 0.4s forwards,neonPulse 2s infinite 0.5s;}
    @keyframes neonPulse{0%,100%{box-shadow:0 0 0 rgba(255,23,68,0)}50%{box-shadow:0 0 20px rgba(255,23,68,0.2),-4px 0 15px rgba(255,23,68,0.3)}}
    .roadmap-item.average{border-left-color:var(--warning);}
    .roadmap-item.excellent{border-left-color:var(--success);}
    .roadmap-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.6rem;}
    .roadmap-subject{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
    .roadmap-time{font-size:0.8rem;padding:0.3rem 0.8rem;border-radius:20px;background:rgba(255,255,255,0.07);color:var(--muted);font-weight:600;}
    .roadmap-topics{color:var(--muted);font-size:0.84rem;margin-bottom:0.7rem;}
    .roadmap-footer{display:flex;justify-content:space-between;align-items:center;}
    .roadmap-duration{font-size:0.82rem;color:var(--muted);}
    .roadmap-score{font-size:0.85rem;font-weight:700;}
    .roadmap-item.critical .roadmap-score{color:var(--danger);}
    .roadmap-item.average .roadmap-score{color:var(--warning);}
    .roadmap-item.excellent .roadmap-score{color:var(--success);}
    .btn-back{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.75rem 1.5rem;border-radius:12px;text-decoration:none;font-size:0.9rem;font-weight:500;transition:all 0.2s;cursor:pointer;}
    .btn-back:hover{border-color:var(--accent);color:var(--accent);}
    .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.5rem;}
    .loader-ring{width:60px;height:60px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;}
    .loader-sub{color:var(--muted);font-size:0.85rem;}
    @media(max-width:600px){.page-header{flex-direction:column;}nav{padding:1rem 1.2rem;}.page-wrap{padding:2rem 1rem 4rem;}}
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loader-text">Analyzing your data...</div>
    <div class="loader-sub">ML model is calculating predictions</div>
  </div>
  <nav>
    <a href="index.html" class="nav-logo">NeuralPrep</a>
    <div class="nav-right">
      <a href="planner.html">← Planner</a>
      <a href="dashboard.html">📈 Dashboard</a>
      <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
  </nav>
  <div class="page-wrap" id="mainContent" style="display:none">
    <div class="page-header">
      <div><h1>📊 Your Study Plan</h1><p id="planSubtitle">Personalized roadmap based on your marks</p></div>
      <div class="header-actions">
        <a href="dashboard.html" class="btn-dashboard">📈 View Dashboard</a>
        <button class="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
      </div>
    </div>
    <div id="alertBanner" class="alert-banner"></div>
    <div class="result-quote" id="resultQuote"></div>
    <div class="scores-grid" id="scoresGrid"></div>
    <div class="chart-card"><div class="chart-title">📈 Predicted Score Overview</div><div class="chart-wrap"><canvas id="scoreChart"></canvas></div></div>
    <div class="roadmap-section">
      <div class="section-title">📅 Study Roadmap</div>
      <div class="time-config">
        <div><label style="font-size:0.75rem;color:var(--muted);display:block;margin-bottom:4px;">Start Time</label><select id="startTime" onchange="rebuildRoadmap()"></select></div>
        <div><label style="font-size:0.75rem;color:var(--muted);display:block;margin-bottom:4px;">End Time</label><select id="endTime" onchange="rebuildRoadmap()"></select></div>
      </div>
      <div class="roadmap-list" id="roadmapList"></div>
    </div>
    <a href="planner.html" class="btn-back">← Edit My Plan</a>
  </div>
  <script>
    function toggleTheme(){const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';localStorage.setItem('theme',h.dataset.theme);}
    const savedTheme=localStorage.getItem('theme');if(savedTheme)document.documentElement.dataset.theme=savedTheme;
    let planData=null,chartInstance=null;

    const resultQuotes=[
      {critical:"Don't panic — every expert was once a beginner. Focus on these subjects now! 💪",average:"You're on the right track. Push a little harder and you'll excel! 🔥",excellent:"Outstanding! Your hard work is paying off. Keep this momentum! 🌟"}
    ];

    function generateTimeSlots(){const slots=[];for(let h=0;h<24;h++)for(let m of[0,30]){const d=new Date(2000,0,1,h,m);slots.push(d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}));}return slots;}
    const slots=generateTimeSlots();
    ['startTime','endTime'].forEach(id=>{const sel=document.getElementById(id);slots.forEach(s=>sel.add(new Option(s,s)));});

    function getStatus(p,m){if(p<m*0.45)return'critical';if(p<m*0.75)return'average';return'excellent';}
    function getStatusLabel(s){return s==='critical'?'🚨 CRITICAL':s==='average'?'🟠 AVERAGE':'🟢 EXCELLENT';}

    function renderScores(predictions){
      const grid=document.getElementById('scoresGrid');grid.innerHTML='';
      predictions.forEach((p,i)=>{
        const status=getStatus(p.predicted,p.maxMark);
        const card=document.createElement('div');card.className=`score-card ${status}`;
        card.innerHTML=`<div class="score-dot" style="background:${p.color}"></div><div class="score-subject">${p.subject}</div><div class="score-num" id="counter-${i}">0</div><div class="score-max">out of ${p.maxMark}</div><div class="score-badge">${getStatusLabel(status)}</div>`;
        grid.appendChild(card);
        animateCounter(`counter-${i}`,p.predicted,1200,i*100);
      });
    }
    function animateCounter(id,target,duration,delay){
      setTimeout(()=>{let start=0;const step=target/(duration/16);const ti=setInterval(()=>{start=Math.min(start+step,target);const el=document.getElementById(id);if(el)el.textContent=Math.round(start);if(start>=target)clearInterval(ti);},16);},delay);
    }
    function renderChart(predictions){
      if(chartInstance)chartInstance.destroy();
      const ctx=document.getElementById('scoreChart').getContext('2d');
      const isDark=document.documentElement.dataset.theme!=='light';
      chartInstance=new Chart(ctx,{type:'bar',data:{labels:predictions.map(p=>p.subject),datasets:[{label:'Predicted Score',data:predictions.map(p=>p.predicted),backgroundColor:predictions.map(p=>{const s=getStatus(p.predicted,p.maxMark);return s==='critical'?'rgba(255,23,68,0.7)':s==='average'?'rgba(255,160,0,0.7)':'rgba(0,230,118,0.7)';}),borderColor:predictions.map(p=>{const s=getStatus(p.predicted,p.maxMark);return s==='critical'?'#ff1744':s==='average'?'#ffa000':'#00e676';}),borderWidth:2,borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:1200,easing:'easeOutBounce'},plugins:{legend:{display:false}},scales:{y:{max:predictions[0]?.maxMark||100,grid:{color:isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'},ticks:{color:'#6b6d8a'}},x:{grid:{display:false},ticks:{color:'#6b6d8a'}}}}});
    }
    function rebuildRoadmap(){
      if(!planData)return;
      const startStr=document.getElementById('startTime').value,endStr=document.getElementById('endTime').value;
      const predictions=planData.predictions,maxMark=predictions[0]?.maxMark||100;
      const weights=predictions.map(p=>p.predicted<maxMark*0.45?2.0:p.predicted<maxMark*0.75?1.0:0.8);
      const totalW=weights.reduce((a,b)=>a+b,0);
      const parseTime=s=>{const[time,ampm]=s.split(' ');let[h,m]=time.split(':').map(Number);if(ampm==='PM'&&h!==12)h+=12;if(ampm==='AM'&&h===12)h=0;return h*60+m;};
      let startMins=parseTime(startStr),endMins=parseTime(endStr);
      if(endMins<=startMins)endMins+=24*60;
      const totalMins=endMins-startMins,breakTotal=15*(predictions.length-1),studyMins=Math.max(totalMins-breakTotal,30);
      const list=document.getElementById('roadmapList');list.innerHTML='';
      let currentMins=startMins;
      predictions.forEach((p,i)=>{
        const sessionMins=Math.round((weights[i]/totalW)*studyMins);
        const durHrs=(sessionMins/60).toFixed(1);
        const status=getStatus(p.predicted,maxMark);
        const toTime=m=>{let h=Math.floor(m/60)%24,min=m%60;const ampm=h>=12?'PM':'AM';h=h%12||12;return`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')} ${ampm}`;};
        const sTime=toTime(currentMins);currentMins+=sessionMins;const eTime=toTime(currentMins);currentMins+=15;
        const topicsStr=p.topics&&p.topics.length>0?p.topics.slice(0,4).join(', ')+(p.topics.length>4?'...':''):'Add topics via AI Suggest in planner';
        const item=document.createElement('div');item.className=`roadmap-item ${status}`;item.style.animationDelay=`${i*0.1}s`;
        item.innerHTML=`<div class="roadmap-header"><div class="roadmap-subject" style="color:${p.color}">${p.subject}</div><div class="roadmap-time">⏰ ${sTime} – ${eTime}</div></div><div class="roadmap-topics">📌 ${topicsStr}</div><div class="roadmap-footer"><div class="roadmap-duration">⏱️ ${durHrs} hrs study + 15 min break</div><div class="roadmap-score">Predicted: ${p.predicted}/${maxMark}</div></div>`;
        list.appendChild(item);
      });
    }
    function renderAlert(predictions){
      const maxMark=predictions[0]?.maxMark||100;
      const critical=predictions.filter(p=>getStatus(p.predicted,maxMark)==='critical');
      const banner=document.getElementById('alertBanner');
      const quoteEl=document.getElementById('resultQuote');
      if(critical.length>0){
        banner.className='alert-banner danger';
        banner.innerHTML=`<div style="font-size:1.5rem">⚠️</div><div><div>Focus Required — Critical Subjects Detected</div><div class="alert-subjects">${critical.map(p=>p.subject).join(', ')}</div></div>`;
        quoteEl.innerHTML=`💬 <em>${resultQuotes[0].critical}</em>`;
      } else {
        const excellent=predictions.filter(p=>getStatus(p.predicted,maxMark)==='excellent');
        banner.className='alert-banner success';
        banner.innerHTML=`<div style="font-size:1.5rem">✅</div><div>Great Performance! You're on track across all subjects.</div>`;
        quoteEl.innerHTML=`💬 <em>${excellent.length===predictions.length?resultQuotes[0].excellent:resultQuotes[0].average}</em>`;
      }
    }
    async function downloadPDF(){
      const{jsPDF}=window.jspdf;const doc=new jsPDF();const predictions=planData.predictions;const cfg=planData.config;
      let y=20;doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(108,99,255);doc.text('NeuralPrep — Study Roadmap',20,y);y+=12;
      doc.setFontSize(10);doc.setTextColor(120,120,140);doc.setFont('helvetica','normal');doc.text(`Generated: ${new Date().toLocaleDateString()} | Mode: ${cfg?.examMode?.toUpperCase()} | Difficulty: ${cfg?.diffLevel?.toUpperCase()}`,20,y);y+=15;
      doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(40,40,60);doc.text('Predicted Scores',20,y);y+=8;
      doc.setFontSize(10);doc.setFont('helvetica','normal');
      predictions.forEach(p=>{const s=getStatus(p.predicted,p.maxMark);const e=s==='critical'?'[CRITICAL]':s==='average'?'[AVERAGE]':'[EXCELLENT]';doc.text(`• ${p.subject}: ${p.predicted}/${p.maxMark}  ${e}`,24,y);y+=7;});
      y+=8;doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(40,40,60);doc.text('Study Schedule',20,y);y+=8;doc.setFontSize(10);doc.setFont('helvetica','normal');
      document.querySelectorAll('.roadmap-item').forEach(item=>{
        const sub=item.querySelector('.roadmap-subject').textContent;const time=item.querySelector('.roadmap-time').textContent;const score=item.querySelector('.roadmap-score').textContent;const topics=item.querySelector('.roadmap-topics').textContent;
        if(y>270){doc.addPage();y=20;}
        doc.setFont('helvetica','bold');doc.setTextColor(60,60,80);doc.text(`${sub} — ${time}`,24,y);y+=6;
        doc.setFont('helvetica','normal');doc.setTextColor(120,120,140);doc.text(`${topics}`,28,y);y+=5;doc.text(`${score}`,28,y);y+=8;
      });
      doc.save('NeuralPrep_StudyRoadmap.pdf');
    }
    window.addEventListener('load',()=>{
      const raw=sessionStorage.getItem('planResult');
      if(!raw){window.location.href='planner.html';return;}
      planData=JSON.parse(raw);
      const cfg=planData.config;
      document.getElementById('planSubtitle').textContent=`${cfg?.examMode==='mid'?'Mid Exam':'Semester Exam'} · ${cfg?.diffLevel?.charAt(0).toUpperCase()+cfg?.diffLevel?.slice(1)} mode · ${planData.predictions.length} subjects`;
      const startSel=document.getElementById('startTime'),endSel=document.getElementById('endTime');
      if(cfg?.startTime)startSel.value=cfg.startTime;if(cfg?.endTime)endSel.value=cfg.endTime;
      renderScores(planData.predictions);renderChart(planData.predictions);renderAlert(planData.predictions);rebuildRoadmap();
      setTimeout(()=>{document.getElementById('loadingScreen').style.opacity='0';document.getElementById('loadingScreen').style.transition='opacity 0.4s';setTimeout(()=>{document.getElementById('loadingScreen').style.display='none';document.getElementById('mainContent').style.display='block';},400);},1200);
    });
  </script>
</body>
</html>
